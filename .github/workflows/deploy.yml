name: Build

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Build topology editor
        run: npm run build

      - name: Get version
        id: ver
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Package
        run: |
          mkdir -p pkg
          cp server.js package.json package-lock.json config.js pkg/
          cp -r lib/ routes/ views/ public/ pkg/
          cp scripts/restart-n150.sh pkg/restart.sh
          cd pkg && npm ci --omit=dev && cd ..
          echo "${{ steps.ver.outputs.sha }}" > pkg/.version
          tar -czf wemonitor.tar.gz -C pkg .
          ls -lh wemonitor.tar.gz

      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          # 每个构建用唯一 tag（commit sha）发布，避免 latest tag 的下载资源
          # 被 CDN 缓存滞后一版，导致自动更新始终拿到旧包、版本校验失败。
          tag_name: ${{ steps.ver.outputs.sha }}
          name: ${{ steps.ver.outputs.sha }}
          body: "Auto build ${{ steps.ver.outputs.sha }}"
          files: wemonitor.tar.gz
          prerelease: true

      - name: Notify N150
        continue-on-error: true
        run: |
          curl -sS -X POST https://wemusic.sherlockguo.com/deploy \
            -H "Content-Type: application/json" \
            -d "{\"project\":\"wemonitor\",\"version\":\"${{ steps.ver.outputs.sha }}\"}" \
            --max-time 10 --connect-timeout 5 || true
